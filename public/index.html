<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>textospro.ai — Redacción profesional</title>

  <link rel="stylesheet" href="d>

<body>
  <header>
    <div class="wrap">
      <div class="brand">
        logo.svg
        <span class="brand-title">textospro.ai</span>
      </div>

      <h1 class="title">Redacción profesional en segundos</h1>
      <p class="lead">
        Escribí qué necesitás y elegí el tono. La IA hace el resto.
      </p>
    </div>
  </header>

  <main class="wrap">
    <div class="ad">Espacio para anuncio</div>

    <div class="grid">
      <section class="panel">
        <div class="chips">
          <div class="chip" data-prompt="Escribí un mail formal informando un aumento.">Aumento tarifa</div>
          <div class="chip" data-prompt="Redactá una respuesta profesional a un reclamo.">Respuesta reclamo</div>
          <div class="chip" data-prompt="Armá una propuesta comercial breve.">Propuesta</div>
          <div class="chip" data-prompt="Escribí una nota bancaria solicitando reconsideración.">Nota bancaria</div>
        </div>

        <label>¿Qué necesitás redactar?</label>
        <textarea id="input"></textarea>

        <div class="row">
          <label for="tone">Tono</label>
          <select id="tone">
            <option value="formal">Formal</option>
            <option value="profesional">Profesional</option>
            <option value="cordial">Cordial</option>
            <option value="neutro">Neutro</option>
          </select>
          <button class="btn" id="generateBtn">Generar</button>
        </div>
      </section>

      <section class="panel">
        <strong>Resultado</strong>
        <div id="output" class="output">Tu texto aparecerá aquí…</div>
        <div class="row">
          <button class="btn" id="copyBtn">Copiar</button>
          <button class="btn secondary" id="clearBtn">Limpiar</button>
        </div>
      </section>
    </div>

    <div class="ad">Espacio para anuncio</div>
  </main>

  <footer>
    © <span id="year"></span> textospro.ai
  </footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

document.querySelectorAll('.chip').forEach(c=>{
  c.onclick = ()=> document.getElementById('input').value = c.dataset.prompt;
});

document.getElementById('copyBtn').onclick = ()=>{
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  alert("Copiado!");
};

document.getElementById('clearBtn').onclick = ()=>{
  document.getElementById('input').value='';
  document.getElementById('output').textContent='Tu texto aparecerá aquí…';
};

document.getElementById('generateBtn').onclick = async ()=>{
  const prompt = document.getElementById('input').value.trim();
  const tone   = document.getElementById('tone').value;

  if(!prompt) return alert("Escribí algo primero");

  document.getElementById('output').textContent="Generando…";

  const r = await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ prompt, tone })
  });

  const js = await r.json();
  document.getElementById('output').textContent = js.text || "Error";
};
</script>

</body>
</html>
